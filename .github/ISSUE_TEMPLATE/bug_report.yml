name: Bug Report
description: Report a bug in Droidspaces (Pure kernels only)
title: "[BUG]: <Short Description>"
labels: [bug, needs-triage]

body:
  - type: markdown
    attributes:
      value: |
        ## 🌐 ENGLISH ONLY
        **All issues MUST be written in English. Non-English reports will be closed without response.**

  - type: markdown
    attributes:
      value: |
        ## ⚠️ STRICT ENFORCEMENT NOTICE
        Duct-taped GKI kernels (CRC nukes, broken ABIs) are strictly unsupported.
        *Non-GKI kernels (< 5.x) have an excuse for legacy oddities, but source code is still needed to provide support.*

  - type: input
    id: kernel-version
    attributes:
      label: Kernel Version
    validations:
      required: true

  - type: input
    id: kernel-source
    attributes:
      label: Kernel Source Link (REQUIRED)
      placeholder: "https://github.com/..."
    validations:
      required: true

  - type: input
    id: droidspaces-version
    attributes:
      label: Droidspaces Version
    validations:
      required: true

  - type: input
    id: rooting-method
    attributes:
      label: Rooting Method
      placeholder: "KernelSU (recommended)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device OEM & Model
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android Version & ROM
    validations:
      required: true

  - type: dropdown
    id: execution-mode
    attributes:
      label: Execution Mode
      options:
        - DAEMON
        - DIRECT
        - Both
    validations:
      required: true

  - type: dropdown
    id: networking-mode
    attributes:
      label: Networking Mode
      options:
        - NAT
        - Host
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Clear steps to trigger the bug.
        Go to **Droidspaces -> Settings -> Generate a bug report** and attach the file below.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Attach your bug report file and any relevant screenshots here.

  - type: checkboxes
    id: acknowledgments
    attributes:
      label: Required Acknowledgments
      options:
        - label: I have verified this is not a duplicate issue.
          required: true
        - label: I am using a kernel compiled strictly according to Droidspaces' official documentation.
          required: true
        - label: I am NOT using a kernel with 69+ random configs, CRC nukes, or a broken ABI.
          required: true
        - label: I have confirmed this issue persists in **both** Daemon and Direct modes.
          required: true
        - label: I admit that I am a clown for checking this box, confirming I have NOT read these rules.
        - label: I admit I did zero research, didn't ask my AI waifu for a fix, and am dropping this here because I'm 100% sure the fault lies with Droidspaces.
